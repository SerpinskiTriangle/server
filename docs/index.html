<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Set character encoding for the document -->
    <meta charset="UTF-8">
    <!-- Configure the viewport for responsive design across devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Set the title of the web page, displayed in the browser tab -->
    <title>HOLY SMOKES</title>
    <!-- Link to the external stylesheet -->
    <!-- This line tells the browser to load and apply styles from 'styles.css' -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Audio element for background music -->
    <!-- The 'autoplay' attribute starts the audio as soon as the page loads -->
    <!-- The 'loop' attribute makes the audio play continuously -->
    <!-- The 'src' attribute specifies the path to the audio file -->
    <audio src="images/surprised.mp3" autoplay loop></audio>
    <!-- Main content container for the title -->
    <!-- This div is used to center the title using Flexbox properties defined in styles.css -->
    <div class="main-title">
      <!-- Display the main title with oil drum emojis -->
      <!-- The emojis are Unicode characters for visual effect -->
      🛢️🛢️ OIL 🛢️🛢️
    </div>
  </body>
</html>
